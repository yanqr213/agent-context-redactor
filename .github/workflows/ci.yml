name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install .
      - name: Test
        run: python -m unittest discover -s tests
      - name: Smoke
        run: python -m agent_context_redactor --help
      - name: SARIF smoke
        run: python -m agent_context_redactor scan examples/sample-project --format sarif --output reports/context-risk.sarif
      - name: Review report smoke
        run: |
          python -m agent_context_redactor scan examples/sample-project --format review --output reports/context-review.md
          grep -q "Context Share Review" reports/context-review.md
          ! grep -q "sampletoken12345" reports/context-review.md
